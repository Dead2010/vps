name: Deploy to Google Cloud VPS

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  VPS_IP: ${{ secrets.VPS_IP }}
  VPS_USER: ${{ secrets.VPS_USER }}
  VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
  DEPLOY_PATH: /var/www/html

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

    - name: Test SSH Connection
      run: |
        ssh -i ~/.ssh/id_rsa ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} "echo 'SSH connection successful'"

    - name: Prepare VPS Directory
      run: |
        ssh -i ~/.ssh/id_rsa ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} "
          sudo mkdir -p ${{ env.DEPLOY_PATH }} &&
          sudo chown -R \$USER:\$USER ${{ env.DEPLOY_PATH }} &&
          sudo chmod -R 755 ${{ env.DEPLOY_PATH }}
        "

    - name: Deploy Files to VPS
      run: |
        rsync -avz --delete -e "ssh -i ~/.ssh/id_rsa" \
          --exclude '.git' \
          --exclude '.github' \
          --exclude 'node_modules' \
          --exclude 'vendor' \
          --exclude '.env' \
          --exclude '*.log' \
          ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:${{ env.DEPLOY_PATH }}/

    - name: Install Dependencies
      run: |
        ssh -i ~/.ssh/id_rsa ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} "
          cd ${{ env.DEPLOY_PATH }} &&
          
          # Node.js
          if [ -f package.json ]; then
            curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash - &&
            sudo apt-get install -y nodejs &&
            npm ci --only=production
          fi &&
          
          # Python
          if [ -f requirements.txt ]; then
            sudo apt-get update &&
            sudo apt-get install -y python3-pip python3-venv &&
            python3 -m venv venv &&
            source venv/bin/activate &&
            pip install -r requirements.txt
          fi &&
          
          # PHP
          if [ -f composer.json ]; then
            sudo apt-get update &&
            sudo apt-get install -y php8.1 php8.1-cli php8.1-fpm php8.1-mysql composer &&
            composer install --no-dev --optimize-autoloader
          fi
        "

    - name: Configure Nginx
      run: |
        ssh -i ~/.ssh/id_rsa ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} "
          # Install Nginx if not present
          if ! command -v nginx &> /dev/null; then
            sudo apt-get update &&
            sudo apt-get install -y nginx
          fi &&
          
          # Create Nginx config
          sudo tee /etc/nginx/sites-available/myapp > /dev/null <<'NGINX_CONF'
server {
    listen 80;
    server_name _;
    root ${{ env.DEPLOY_PATH }};
    index index.html index.htm index.php;
    
    location / {
        try_files \$uri \$uri/ /index.html;
    }
    
    location ~ \.php\$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
    }
}
NGINX_CONF
          
          # Enable site
          sudo ln -sf /etc/nginx/sites-available/myapp /etc/nginx/sites-enabled/ &&
          sudo rm -f /etc/nginx/sites-enabled/default &&
          sudo nginx -t &&
          sudo systemctl reload nginx
        "

    - name: Start Application
      run: |
        ssh -i ~/.ssh/id_rsa ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} "
          cd ${{ env.DEPLOY_PATH }} &&
          
          # Start Node.js app
          if [ -f package.json ]; then
            if ! command -v pm2 &> /dev/null; then
              sudo npm install -g pm2
            fi &&
            
            if [ -f server.js ]; then
              pm2 delete server 2>/dev/null || true &&
              pm2 start server.js --name 'myapp'
            elif [ -f app.js ]; then
              pm2 delete app 2>/dev/null || true &&
              pm2 start app.js --name 'myapp'
            elif [ -f index.js ]; then
              pm2 delete index 2>/dev/null || true &&
              pm2 start index.js --name 'myapp'
            fi &&
            
            pm2 save &&
            sudo env PATH=\$PATH:/usr/bin pm2 startup systemd -u \$USER --hp /home/\$USER
          fi
        "

    - name: Configure Firewall
      run: |
        ssh -i ~/.ssh/id_rsa ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} "
          # Install UFW if not present
          if ! command -v ufw &> /dev/null; then
            sudo apt-get update &&
            sudo apt-get install -y ufw
          fi &&
          
          # Reset and configure UFW
          sudo ufw --force reset &&
          sudo ufw default deny incoming &&
          sudo ufw default allow outgoing &&
          
          # Allow SSH
          sudo ufw allow 22/tcp &&
          
          # Allow all ports from 1 to 67890
          sudo ufw allow 1:67890/tcp &&
          sudo ufw allow 1:67890/udp &&
          
          # Allow common web ports
          sudo ufw allow 80/tcp &&
          sudo ufw allow 443/tcp &&
          sudo ufw allow 3000/tcp &&
          sudo ufw allow 8000/tcp &&
          sudo ufw allow 8080/tcp &&
          
          # Enable UFW
          echo 'y' | sudo ufw enable &&
          sudo ufw status verbose
        "

    - name: Verify Deployment
      run: |
        ssh -i ~/.ssh/id_rsa ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} "
          echo 'Testing services...' &&
          curl -I http://localhost 2>/dev/null | head -n 1 || echo 'Web server not responding' &&
          curl -I http://localhost:3000 2>/dev/null | head -n 1 || echo 'Node.js not responding' &&
          echo 'Deployment verification complete'
        "

    - name: Deployment Summary
      if: always()
      run: |
        echo "==================== DEPLOYMENT SUMMARY ===================="
        echo "✅ VPS: ${{ secrets.VPS_IP }}"
        echo "✅ User: ${{ secrets.VPS_USER }}"
        echo "✅ Path: ${{ env.DEPLOY_PATH }}"
        echo "✅ Firewall: Ports 1-67890 open"
        echo ""
        echo "📱 Access your application at: http://${{ secrets.VPS_IP }}"
        echo "============================================================"
