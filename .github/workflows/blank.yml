name: Create Oracle Cloud VPS in Singapore

on:
  workflow_dispatch:  # Manual trigger only
  push:
    branches: [ main ]

jobs:
  create-oracle-vps:
    name: Create Oracle Cloud VPS
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup OCI CLI
      run: |
        # Install OCI CLI
        curl -L -O https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh
        chmod +x install.sh
        ./install.sh --accept-all-defaults
        echo "/home/runner/bin" >> $GITHUB_PATH
        
        # Verify installation
        oci --version

    - name: Configure OCI CLI
      run: |
        # Save private key
        echo "${{ secrets.ORACLE_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
        chmod 600 ~/.oci/oci_api_key.pem
        
        # Create OCI config file
        mkdir -p ~/.oci
        cat > ~/.oci/config << EOF
        [DEFAULT]
        user=${{ secrets.ORACLE_USER_OCID }}
        fingerprint=${{ secrets.ORACLE_FINGERPRINT }}
        tenancy=${{ secrets.ORACLE_TENANCY_OCID }}
        region=${{ secrets.ORACLE_REGION }}
        key_file=~/.oci/oci_api_key.pem
        EOF
        
        # Verify configuration
        oci iam region list --all

    - name: Generate SSH Key Pair
      id: ssh-key
      run: |
        # Generate SSH key
        ssh-keygen -t rsa -b 4096 -f oracle-vps-key -N "" -C "admin"
        
        # Save public key
        SSH_PUBLIC_KEY=$(cat oracle-vps-key.pub)
        echo "SSH_PUBLIC_KEY=$SSH_PUBLIC_KEY" >> $GITHUB_ENV
        
        # Save private key for artifact
        cp oracle-vps-key oracle-vps-key.pem
        chmod 600 oracle-vps-key.pem
        
        echo "✅ SSH key pair generated"

    - name: Create Network Resources
      run: |
        # Create VCN (Virtual Cloud Network)
        VCN_ID=$(oci network vcn create \
          --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
          --cidr-block "10.0.0.0/16" \
          --display-name "sg-vps-vcn" \
          --dns-label "sgvps" \
          --wait-for-state "AVAILABLE" \
          --query 'data.id' \
          --raw-output)
        
        echo "VCN_ID=$VCN_ID" >> $GITHUB_ENV
        echo "✅ VCN created: $VCN_ID"
        
        # Create subnet
        SUBNET_ID=$(oci network subnet create \
          --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
          --vcn-id $VCN_ID \
          --cidr-block "10.0.1.0/24" \
          --display-name "sg-vps-subnet" \
          --dns-label "sgsubnet" \
          --wait-for-state "AVAILABLE" \
          --query 'data.id' \
          --raw-output)
        
        echo "SUBNET_ID=$SUBNET_ID" >> $GITHUB_ENV
        echo "✅ Subnet created: $SUBNET_ID"
        
        # Create Internet Gateway
        IGW_ID=$(oci network internet-gateway create \
          --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
          --vcn-id $VCN_ID \
          --is-enabled true \
          --display-name "sg-vps-igw" \
          --wait-for-state "AVAILABLE" \
          --query 'data.id' \
          --raw-output)
        
        echo "IGW_ID=$IGW_ID" >> $GITHUB_ENV
        echo "✅ Internet Gateway created"

    - name: Configure Route and Security Rules
      run: |
        # Get route table ID
        ROUTE_TABLE_ID=$(oci network route-table list \
          --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
          --vcn-id $VCN_ID \
          --query 'data[0].id' \
          --raw-output)
        
        # Add route rule for internet gateway
        oci network route-table update \
          --rt-id $ROUTE_TABLE_ID \
          --route-rules '[{"cidrBlock":"0.0.0.0/0","networkEntityId":"'$IGW_ID'"}]' \
          --force
        
        echo "✅ Route table updated"
        
        # Create security list with ALL PORTS OPEN (1-67899)
        SECURITY_LIST_ID=$(oci network security-list create \
          --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
          --vcn-id $VCN_ID \
          --display-name "sg-vps-security-list" \
          --egress-security-rules '[{"destination":"0.0.0.0/0","protocol":"all","isStateless":false}]' \
          --ingress-security-rules '[
            {
              "source":"0.0.0.0/0",
              "protocol":"6",
              "tcpOptions":{"destinationPortRange":{"min":1,"max":67899}},
              "isStateless":false,
              "description":"Allow all TCP ports 1-67899"
            },
            {
              "source":"0.0.0.0/0",
              "protocol":"17",
              "udpOptions":{"destinationPortRange":{"min":1,"max":67899}},
              "isStateless":false,
              "description":"Allow all UDP ports 1-67899"
            },
            {
              "source":"0.0.0.0/0",
              "protocol":"1",
              "icmpOptions":{"type":8,"code":4},
              "isStateless":false,
              "description":"Allow ICMP (ping)"
            }
          ]' \
          --query 'data.id' \
          --raw-output)
        
        echo "SECURITY_LIST_ID=$SECURITY_LIST_ID" >> $GITHUB_ENV
        echo "✅ Security list created - ALL PORTS 1-67899 OPEN!"

    - name: Create VM Instance
      id: create-vm
      run: |
        # Get the latest Oracle Linux image
        IMAGE_ID=$(oci compute image list \
          --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
          --operating-system "Oracle Linux" \
          --operating-system-version "8" \
          --shape "VM.Standard.E2.1.Micro" \
          --sort-by "TIMECREATED" \
          --query 'data[0].id' \
          --raw-output)
        
        # Create instance
        INSTANCE_ID=$(oci compute instance launch \
          --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
          --availability-domain "AD-1" \
          --shape "VM.Standard.E2.1.Micro" \
          --subnet-id $SUBNET_ID \
          --image-id $IMAGE_ID \
          --display-name "sg-vps" \
          --metadata '{"ssh_authorized_keys":"'"${{ env.SSH_PUBLIC_KEY }}"'"}' \
          --wait-for-state "RUNNING" \
          --query 'data.id' \
          --raw-output)
        
        echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV
        
        # Wait for instance to be fully ready
        sleep 60
        
        # Get public IP
        PUBLIC_IP=$(oci compute instance list-vnics \
          --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
          --instance-id $INSTANCE_ID \
          --query 'data[0]."public-ip"' \
          --raw-output)
        
        echo "PUBLIC_IP=$PUBLIC_IP" >> $GITHUB_ENV
        
        echo "✅ VM created successfully!"
        echo "🌐 Public IP: $PUBLIC_IP"

    - name: Wait for SSH
      run: |
        echo "Waiting for SSH on ${{ env.PUBLIC_IP }}..."
        for i in {1..60}; do
          if nc -zv ${{ env.PUBLIC_IP }} 22 2>&1 | grep -q "succeeded"; then
            echo "✅ SSH ready after $i attempts"
            break
          fi
          echo "Attempt $i/60: SSH not ready..."
          sleep 10
        done

    - name: Setup VM with admin/admin
      run: |
        # Save private key
        echo "${{ env.SSH_PUBLIC_KEY }}" > oracle-vps-key
        chmod 600 oracle-vps-key
        
        # Create a setup script
        cat > setup-vm.sh << 'EOF'
        #!/bin/bash
        
        # Create admin user if not exists
        if ! id "admin" &>/dev/null; then
          sudo useradd -m -s /bin/bash admin
          echo "admin:admin" | sudo chpasswd
          sudo usermod -aG wheel admin
        else
          echo "admin:admin" | sudo chpasswd
        fi
        
        # Configure SSH
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo systemctl restart sshd
        
        # Allow password sudo
        echo "admin ALL=(ALL) ALL" | sudo tee /etc/sudoers.d/admin
        
        # Install basic packages
        sudo dnf update -y
        sudo dnf install -y \
          curl \
          wget \
          git \
          vim \
          htop \
          net-tools \
          docker \
          nginx \
          python3 \
          python3-pip \
          firewalld
        
        # Start Docker
        sudo systemctl enable docker
        sudo systemctl start docker
        sudo usermod -aG docker admin
        
        # Configure firewall (open all ports 1-67899)
        sudo systemctl enable firewalld
        sudo systemctl start firewalld
        sudo firewall-cmd --permanent --add-port=1-67899/tcp
        sudo firewall-cmd --permanent --add-port=1-67899/udp
        sudo firewall-cmd --reload
        
        # Create welcome page
        cat > /tmp/index.html << 'HTML'
        <!DOCTYPE html>
        <html>
        <head>
            <title>Oracle Cloud Singapore VPS</title>
            <style>
                body {
                    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                    margin: 0;
                    padding: 50px;
                    background: linear-gradient(135deg, #ff6b6b 0%, #4ecdc4 100%);
                    color: white;
                    text-align: center;
                }
                .container {
                    background: rgba(255,255,255,0.1);
                    padding: 40px;
                    border-radius: 20px;
                    backdrop-filter: blur(10px);
                }
                h1 { font-size: 3em; margin-bottom: 20px; }
                .port-badge {
                    display: inline-block;
                    background: rgba(255,255,255,0.2);
                    padding: 10px 20px;
                    margin: 5px;
                    border-radius: 30px;
                    font-weight: bold;
                }
                .info {
                    background: rgba(0,0,0,0.2);
                    padding: 20px;
                    border-radius: 10px;
                    margin-top: 30px;
                }
            </style>
        </head>
        <body>
            <div class="container">
                <h1>🇸🇬 Oracle Cloud Singapore VPS</h1>
                <p>Username: <strong>admin</strong></p>
                <p>Password: <strong>admin</strong></p>
                <div class="info">
                    <h2>🔥 ALL PORTS 1-67899 ARE OPEN!</h2>
                    <div>
                        <span class="port-badge">TCP 1-67899</span>
                        <span class="port-badge">UDP 1-67899</span>
                        <span class="port-badge">ICMP</span>
                        <span class="port-badge">SSH 22</span>
                        <span class="port-badge">HTTP 80</span>
                        <span class="port-badge">HTTPS 443</span>
                    </div>
                    <p>IP Address: ${{ env.PUBLIC_IP }}</p>
                </div>
                <p>Your VPS is ready! SSH with: ssh admin@${{ env.PUBLIC_IP }}</p>
            </div>
        </body>
        </html>
        HTML
        
        sudo mv /tmp/index.html /usr/share/nginx/html/
        sudo systemctl enable nginx
        sudo systemctl start nginx
        
        # Create test server on port 8080
        cat > /tmp/test-server.py << 'PYEOF'
        import http.server
        import socketserver
        import socket
        
        PORT = 8080
        
        class Handler(http.server.SimpleHTTPRequestHandler):
            def do_GET(self):
                self.send_response(200)
                self.send_header('Content-type', 'text/html')
                self.end_headers()
                
                html = f"""
                <html>
                <head><title>Oracle Cloud Test Server</title>
                <style>
                    body {{ font-family: Arial; background: #f0f0f0; padding: 30px; }}
                    .container {{ background: white; padding: 20px; border-radius: 10px; }}
                    h1 {{ color: #ff6b6b; }}
                </style>
                </head>
                <body>
                    <div class="container">
                        <h1>🇸🇬 Oracle Cloud Test Server</h1>
                        <p>Port 8080 is working!</p>
                        <p>All ports 1-67899 are open!</p>
                        <p>Username: admin</p>
                        <p>Password: admin</p>
                    </div>
                </body>
                </html>
                """
                self.wfile.write(html.encode())
        
        with socketserver.TCPServer(("", PORT), Handler) as httpd:
            httpd.serve_forever()
        PYEOF
        
        python3 /tmp/test-server.py &
        echo "✅ Test server running on port 8080"
        
        # Create keepalive script
        cat > /tmp/keepalive.sh << 'SHEOF'
        #!/bin/bash
        while true; do
          curl -s http://localhost > /dev/null
          curl -s http://localhost:8080 > /dev/null
          sleep 300
        done
        SHEEOF
        
        chmod +x /tmp/keepalive.sh
        /tmp/keepalive.sh &
        
        echo "✅ VM setup complete!"
        EOF
        
        # Copy and execute setup script
        scp -o StrictHostKeyChecking=no -i oracle-vps-key \
          setup-vm.sh opc@${{ env.PUBLIC_IP }}:/tmp/
        
        ssh -o StrictHostKeyChecking=no -i oracle-vps-key \
          opc@${{ env.PUBLIC_IP }} "sudo bash /tmp/setup-vm.sh"

    - name: Display Connection Information
      run: |
        echo "========================================================"
        echo "✅ ORACLE CLOUD SINGAPORE VPS CREATED!"
        echo "========================================================"
        echo ""
        echo "📋 CONNECTION DETAILS:"
        echo "   IP Address: ${{ env.PUBLIC_IP }}"
        echo "   Username: admin"
        echo "   Password: admin"
        echo ""
        echo "🔗 SSH COMMAND:"
        echo "   ssh admin@${{ env.PUBLIC_IP }}"
        echo "   (password: admin)"
        echo ""
        echo "🌐 WEB ACCESS:"
        echo "   Nginx: http://${{ env.PUBLIC_IP }}"
        echo "   Test Server: http://${{ env.PUBLIC_IP }}:8080"
        echo ""
        echo "🔥 FIREWALL STATUS:"
        echo "   ✅ ALL TCP PORTS 1-67899 OPEN"
        echo "   ✅ ALL UDP PORTS 1-67899 OPEN"
        echo "   ✅ ICMP (Ping) ENABLED"
        echo ""
        echo "📝 TEST COMMANDS:"
        echo "   ping ${{ env.PUBLIC_IP }}"
        echo "   nc -zv ${{ env.PUBLIC_IP }} 22"
        echo "   nc -zv ${{ env.PUBLIC_IP }} 80"
        echo "   nc -zv ${{ env.PUBLIC_IP }} 8080"
        echo "   nmap -p 1-1000 ${{ env.PUBLIC_IP }}"
        echo ""
        echo "⚠️  NOTE: This is an Oracle Cloud Always Free VM"
        echo "========================================================"

    - name: Save Connection Info
      run: |
        cat > oracle-vps-info.txt << EOF
        ========================================================
        ORACLE CLOUD SINGAPORE VPS
        ========================================================
        
        CONNECTION DETAILS:
        -------------------
        IP Address: ${{ env.PUBLIC_IP }}
        Username: admin
        Password: admin
        
        SSH COMMAND:
        ssh admin@${{ env.PUBLIC_IP }}
        
        WEB URLs:
        http://${{ env.PUBLIC_IP }}
        http://${{ env.PUBLIC_IP }}:8080 (Test Server)
        
        FIREWALL:
        All ports 1-67899 are OPEN (TCP & UDP)
        
        TEST COMMANDS:
        ping ${{ env.PUBLIC_IP }}
        nc -zv ${{ env.PUBLIC_IP }} 22
        nc -zv ${{ env.PUBLIC_IP }} 80
        nc -zv ${{ env.PUBLIC_IP }} 8080
        
        ========================================================
        EOF

    - name: Upload Connection Info
      uses: actions/upload-artifact@v4
      with:
        name: oracle-vps-connection-info
        path: oracle-vps-info.txt
