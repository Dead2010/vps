name: Bore SSH VPS

on:
  workflow_dispatch:

jobs:
  vps:
    runs-on: ubuntu-latest
    steps:

    - name: Setup SSH
      run: |
        sudo apt-get update
        sudo apt-get install -y openssh-server curl
        sudo mkdir /var/run/sshd
        echo 'runner:12345678' | sudo chpasswd

        sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config

        sudo service ssh start

    - name: Install Bore
      run: |
        curl -L https://github.com/ekzhang/bore/releases/latest/download/bore-x86_64-unknown-linux-musl -o bore
        chmod +x bore

    - name: Start Bore Tunnel
      run: |
        ./bore local 22 --to bore.pub &

        sleep 10

    - name: Show Login
      run: |
        echo "======================="
        echo "SSH USER: runner"
        echo "SSH PASSWORD: 12345678"
        echo "HOST: bore.pub"
        echo "PORT: Check above logs"
        echo "======================="

    - name: Keep Alive
      run: sleep 21600