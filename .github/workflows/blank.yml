name: Create Oracle Cloud VPS in Singapore

on:
  workflow_dispatch:  # Manual trigger only
  push:
    branches: [ main ]

jobs:
  create-oracle-vps:
    name: Create Oracle Cloud VPS
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Debug - Show Secret Lengths (Safe)
      run: |
        echo "Checking secret lengths..."
        echo "ORACLE_TENANCY_OCID length: ${#ORACLE_TENANCY_OCID}"
        echo "ORACLE_USER_OCID length: ${#ORACLE_USER_OCID}"
        echo "ORACLE_FINGERPRINT length: ${#ORACLE_FINGERPRINT}"
        echo "ORACLE_COMPARTMENT_OCID length: ${#ORACLE_COMPARTMENT_OCID}"
        echo "ORACLE_REGION: ${{ secrets.ORACLE_REGION }}"
      env:
        ORACLE_TENANCY_OCID: ${{ secrets.ORACLE_TENANCY_OCID }}
        ORACLE_USER_OCID: ${{ secrets.ORACLE_USER_OCID }}
        ORACLE_FINGERPRINT: ${{ secrets.ORACLE_FINGERPRINT }}
        ORACLE_COMPARTMENT_OCID: ${{ secrets.ORACLE_COMPARTMENT_OCID }}

    - name: Setup Python and Install OCI CLI
      run: |
        # Update package list
        sudo apt-get update
        
        # Install Python and pip
        sudo apt-get install -y python3 python3-pip
        
        # Install OCI CLI
        pip3 install --upgrade pip
        pip3 install oci-cli
        
        # Add to PATH
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        export PATH="$HOME/.local/bin:$PATH"
        
        # Verify installation
        which oci || echo "OCI not found in PATH"
        oci --version || echo "OCI version command failed"
        
        echo "✅ OCI CLI installed"

    - name: Configure OCI CLI
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        
        # Create .oci directory with correct permissions
        mkdir -p ~/.oci
        chmod 700 ~/.oci
        
        # Save private key - ensure it has correct format
        echo "${{ secrets.ORACLE_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
        
        # Fix private key format if needed
        sed -i 's/\\n/\n/g' ~/.oci/oci_api_key.pem
        chmod 600 ~/.oci/oci_api_key.pem
        
        # Show key info (first and last line only)
        echo "Private key first line:"
        head -n 1 ~/.oci/oci_api_key.pem
        echo "Private key last line:"
        tail -n 1 ~/.oci/oci_api_key.pem
        
        # Create OCI config file with proper format
        cat > ~/.oci/config << EOF
        [DEFAULT]
        user=${{ secrets.ORACLE_USER_OCID }}
        fingerprint=${{ secrets.ORACLE_FINGERPRINT }}
        tenancy=${{ secrets.ORACLE_TENANCY_OCID }}
        region=${{ secrets.ORACLE_REGION }}
        key_file=~/.oci/oci_api_key.pem
        EOF
        
        # Set correct permissions
        chmod 600 ~/.oci/config
        
        echo "✅ OCI CLI configured"
        
        # Test configuration
        echo "Testing OCI configuration..."
        oci iam region list --query 'data[?name==`ap-singapore-1`].name' || {
          echo "❌ OCI configuration test failed"
          echo "Please check your OCIDs and fingerprint"
          exit 1
        }

    - name: Generate SSH Key Pair
      id: ssh-key
      run: |
        # Generate SSH key
        ssh-keygen -t rsa -b 4096 -f oracle-vps-key -N "" -C "admin"
        
        # Save public key
        SSH_PUBLIC_KEY=$(cat oracle-vps-key.pub)
        echo "SSH_PUBLIC_KEY=$SSH_PUBLIC_KEY" >> $GITHUB_ENV
        
        # Save private key for artifact
        cp oracle-vps-key oracle-vps-key.pem
        chmod 600 oracle-vps-key.pem
        
        echo "✅ SSH key pair generated"

    - name: Create Network Resources
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        
        # Get availability domain
        AD_NAME=$(oci iam availability-domain list \
          --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
          --query 'data[0].name' \
          --raw-output)
        
        echo "AD_NAME=$AD_NAME" >> $GITHUB_ENV
        echo "✅ Using Availability Domain: $AD_NAME"
        
        # Create VCN
        VCN_ID=$(oci network vcn create \
          --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
          --cidr-block "10.0.0.0/16" \
          --display-name "sg-vps-vcn" \
          --dns-label "sgvps" \
          --wait-for-state "AVAILABLE" \
          --query 'data.id' \
          --raw-output)
        
        echo "VCN_ID=$VCN_ID" >> $GITHUB_ENV
        echo "✅ VCN created: $VCN_ID"
        
        # Create subnet
        SUBNET_ID=$(oci network subnet create \
          --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
          --vcn-id $VCN_ID \
          --cidr-block "10.0.1.0/24" \
          --display-name "sg-vps-subnet" \
          --dns-label "sgsubnet" \
          --wait-for-state "AVAILABLE" \
          --query 'data.id' \
          --raw-output)
        
        echo "SUBNET_ID=$SUBNET_ID" >> $GITHUB_ENV
        echo "✅ Subnet created: $SUBNET_ID"
        
        # Create Internet Gateway
        IGW_ID=$(oci network internet-gateway create \
          --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
          --vcn-id $VCN_ID \
          --is-enabled true \
          --display-name "sg-vps-igw" \
          --wait-for-state "AVAILABLE" \
          --query 'data.id' \
          --raw-output)
        
        echo "IGW_ID=$IGW_ID" >> $GITHUB_ENV
        echo "✅ Internet Gateway created"

    - name: Configure Route and Security Rules
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        
        # Get default route table
        ROUTE_TABLE_ID=$(oci network route-table list \
          --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
          --vcn-id $VCN_ID \
          --query 'data[0].id' \
          --raw-output)
        
        # Add route rule for internet gateway
        oci network route-table update \
          --rt-id $ROUTE_TABLE_ID \
          --route-rules "[{\"cidrBlock\":\"0.0.0.0/0\",\"networkEntityId\":\"$IGW_ID\"}]" \
          --force
        
        echo "✅ Route table updated"
        
        # Create security list with ALL PORTS OPEN
        SECURITY_LIST_ID=$(oci network security-list create \
          --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
          --vcn-id $VCN_ID \
          --display-name "sg-vps-security-list" \
          --egress-security-rules '[{"destination":"0.0.0.0/0","protocol":"all"}]' \
          --ingress-security-rules '[
            {"source":"0.0.0.0/0","protocol":"6","tcpOptions":{"destinationPortRange":{"min":1,"max":67899}}},
            {"source":"0.0.0.0/0","protocol":"17","udpOptions":{"destinationPortRange":{"min":1,"max":67899}}},
            {"source":"0.0.0.0/0","protocol":"1","icmpOptions":{"type":8,"code":4}}
          ]' \
          --query 'data.id' \
          --raw-output)
        
        echo "SECURITY_LIST_ID=$SECURITY_LIST_ID" >> $GITHUB_ENV
        echo "✅ Security list created - ALL PORTS 1-67899 OPEN!"

    - name: Create VM Instance
      id: create-vm
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        
        # Get the latest Oracle Linux image
        IMAGE_ID=$(oci compute image list \
          --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
          --operating-system "Oracle Linux" \
          --operating-system-version "8" \
          --shape "VM.Standard.E2.1.Micro" \
          --sort-by "TIMECREATED" \
          --query 'data[0].id' \
          --raw-output)
        
        echo "✅ Using image: $IMAGE_ID"
        
        # Create instance
        INSTANCE_ID=$(oci compute instance launch \
          --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
          --availability-domain "$AD_NAME" \
          --shape "VM.Standard.E2.1.Micro" \
          --subnet-id $SUBNET_ID \
          --image-id $IMAGE_ID \
          --display-name "sg-vps" \
          --metadata "{\"ssh_authorized_keys\":\"${{ env.SSH_PUBLIC_KEY }}\"}" \
          --wait-for-state "RUNNING" \
          --query 'data.id' \
          --raw-output)
        
        echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV
        echo "✅ Instance created: $INSTANCE_ID"
        
        # Wait for instance to be fully ready
        echo "Waiting 60 seconds for instance to initialize..."
        sleep 60
        
        # Get public IP
        for i in {1..10}; do
          PUBLIC_IP=$(oci compute instance list-vnics \
            --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
            --instance-id $INSTANCE_ID \
            --query 'data[0]."public-ip"' \
            --raw-output)
          
          if [ -n "$PUBLIC_IP" ] && [ "$PUBLIC_IP" != "null" ]; then
            break
          fi
          echo "Waiting for public IP... attempt $i"
          sleep 10
        done
        
        echo "PUBLIC_IP=$PUBLIC_IP" >> $GITHUB_ENV
        echo "✅ VM created successfully!"
        echo "🌐 Public IP: $PUBLIC_IP"

    - name: Wait for SSH
      run: |
        echo "Waiting for SSH on ${{ env.PUBLIC_IP }}..."
        for i in {1..60}; do
          if nc -zv ${{ env.PUBLIC_IP }} 22 2>&1 | grep -q "succeeded"; then
            echo "✅ SSH ready after $i attempts"
            break
          fi
          echo "Attempt $i/60: SSH not ready..."
          sleep 10
        done

    - name: Display Connection Information
      run: |
        echo "========================================================"
        echo "✅ ORACLE CLOUD SINGAPORE VPS CREATED!"
        echo "========================================================"
        echo ""
        echo "📋 CONNECTION DETAILS:"
        echo "   IP Address: ${{ env.PUBLIC_IP }}"
        echo ""
        echo "🔗 SSH CONNECTION (Default Oracle Linux user):"
        echo "   ssh -i oracle-vps-key.pem opc@${{ env.PUBLIC_IP }}"
        echo ""
        echo "📝 After connecting, run these commands to setup admin user:"
        echo "   sudo useradd -m -s /bin/bash admin"
        echo "   echo 'admin:admin' | sudo chpasswd"
        echo "   sudo usermod -aG wheel admin"
        echo "   sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config"
        echo "   sudo systemctl restart sshd"
        echo ""
        echo "🌐 WEB ACCESS:"
        echo "   http://${{ env.PUBLIC_IP }}"
        echo ""
        echo "🔥 FIREWALL: ALL PORTS 1-67899 OPEN"
        echo "========================================================"

    - name: Save SSH Private Key
      uses: actions/upload-artifact@v4
      with:
        name: oracle-vps-ssh-key
        path: oracle-vps-key.pem

    - name: Save Connection Info
      run: |
        cat > oracle-vps-info.txt << EOF
        ========================================================
        ORACLE CLOUD SINGAPORE VPS
        ========================================================
        
        IP Address: ${{ env.PUBLIC_IP }}
        
        SSH COMMAND:
        ssh -i oracle-vps-key.pem opc@${{ env.PUBLIC_IP }}
        
        After setup:
        Username: admin
        Password: admin
        SSH: ssh admin@${{ env.PUBLIC_IP }}
        
        WEB URL:
        http://${{ env.PUBLIC_IP }}
        
        FIREWALL:
        All ports 1-67899 OPEN (TCP & UDP)
        
        ========================================================
        EOF

    - name: Upload Connection Info
      uses: actions/upload-artifact@v4
      with:
        name: oracle-vps-connection-info
        path: oracle-vps-info.txt
