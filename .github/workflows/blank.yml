name: Create Oracle Cloud VPS in Singapore

on:
  workflow_dispatch:  # Manual trigger only
  push:
    branches: [ main ]

jobs:
  create-oracle-vps:
    name: Create Oracle Cloud VPS
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python and Install OCI CLI
      run: |
        # Update package list
        sudo apt-get update
        
        # Install Python and venv if needed
        sudo apt-get install -y python3 python3-pip python3-venv
        
        # Install OCI CLI using pip (simpler method)
        pip3 install --upgrade pip
        pip3 install oci-cli
        
        # Add to PATH
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        echo "✅ OCI CLI installed"

    - name: Verify OCI CLI Installation
      run: |
        # Source the PATH
        export PATH="$HOME/.local/bin:$PATH"
        
        # Verify installation
        which oci
        oci --version
        echo "✅ OCI CLI verified"

    - name: Configure OCI CLI
      run: |
        # Create .oci directory
        mkdir -p ~/.oci
        
        # Save private key
        echo "${{ secrets.ORACLE_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
        chmod 600 ~/.oci/oci_api_key.pem
        
        # Create OCI config file
        cat > ~/.oci/config << EOF
        [DEFAULT]
        user=${{ secrets.ORACLE_USER_OCID }}
        fingerprint=${{ secrets.ORACLE_FINGERPRINT }}
        tenancy=${{ secrets.ORACLE_TENANCY_OCID }}
        region=${{ secrets.ORACLE_REGION }}
        key_file=~/.oci/oci_api_key.pem
        EOF
        
        echo "✅ OCI CLI configured"
        
        # Test configuration
        export PATH="$HOME/.local/bin:$PATH"
        oci iam region list --all

    - name: Generate SSH Key Pair
      id: ssh-key
      run: |
        # Generate SSH key
        ssh-keygen -t rsa -b 4096 -f oracle-vps-key -N "" -C "admin"
        
        # Save public key
        SSH_PUBLIC_KEY=$(cat oracle-vps-key.pub)
        echo "SSH_PUBLIC_KEY=$SSH_PUBLIC_KEY" >> $GITHUB_ENV
        echo "SSH_PUBLIC_KEY_CONTENT=$SSH_PUBLIC_KEY" >> $GITHUB_ENV
        
        # Save private key for artifact
        cp oracle-vps-key oracle-vps-key.pem
        chmod 600 oracle-vps-key.pem
        
        echo "✅ SSH key pair generated"
        echo "Public key: $SSH_PUBLIC_KEY"

    - name: Create Network Resources
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        
        # Get availability domain
        AD_NAME=$(oci iam availability-domain list \
          --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
          --query 'data[0].name' \
          --raw-output)
        
        echo "AD_NAME=$AD_NAME" >> $GITHUB_ENV
        echo "✅ Using Availability Domain: $AD_NAME"
        
        # Create VCN (Virtual Cloud Network)
        VCN_ID=$(oci network vcn create \
          --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
          --cidr-block "10.0.0.0/16" \
          --display-name "sg-vps-vcn" \
          --dns-label "sgvps" \
          --wait-for-state "AVAILABLE" \
          --query 'data.id' \
          --raw-output 2>/dev/null || echo "")
        
        if [ -z "$VCN_ID" ]; then
          echo "VCN may already exist, trying to get existing..."
          VCN_ID=$(oci network vcn list \
            --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
            --display-name "sg-vps-vcn" \
            --query 'data[0].id' \
            --raw-output)
        fi
        
        echo "VCN_ID=$VCN_ID" >> $GITHUB_ENV
        echo "✅ VCN: $VCN_ID"
        
        # Create subnet
        SUBNET_ID=$(oci network subnet create \
          --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
          --vcn-id $VCN_ID \
          --cidr-block "10.0.1.0/24" \
          --display-name "sg-vps-subnet" \
          --dns-label "sgsubnet" \
          --wait-for-state "AVAILABLE" \
          --query 'data.id' \
          --raw-output 2>/dev/null || echo "")
        
        if [ -z "$SUBNET_ID" ]; then
          echo "Subnet may already exist, trying to get existing..."
          SUBNET_ID=$(oci network subnet list \
            --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
            --vcn-id $VCN_ID \
            --display-name "sg-vps-subnet" \
            --query 'data[0].id' \
            --raw-output)
        fi
        
        echo "SUBNET_ID=$SUBNET_ID" >> $GITHUB_ENV
        echo "✅ Subnet: $SUBNET_ID"
        
        # Create Internet Gateway
        IGW_ID=$(oci network internet-gateway create \
          --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
          --vcn-id $VCN_ID \
          --is-enabled true \
          --display-name "sg-vps-igw" \
          --wait-for-state "AVAILABLE" \
          --query 'data.id' \
          --raw-output 2>/dev/null || echo "")
        
        if [ -z "$IGW_ID" ]; then
          echo "Internet Gateway may already exist, trying to get existing..."
          IGW_ID=$(oci network internet-gateway list \
            --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
            --vcn-id $VCN_ID \
            --display-name "sg-vps-igw" \
            --query 'data[0].id' \
            --raw-output)
        fi
        
        echo "IGW_ID=$IGW_ID" >> $GITHUB_ENV
        echo "✅ Internet Gateway: $IGW_ID"

    - name: Configure Route and Security Rules
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        
        # Get route table ID
        ROUTE_TABLE_ID=$(oci network route-table list \
          --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
          --vcn-id $VCN_ID \
          --query 'data[0].id' \
          --raw-output)
        
        echo "ROUTE_TABLE_ID=$ROUTE_TABLE_ID" >> $GITHUB_ENV
        
        # Add route rule for internet gateway
        oci network route-table update \
          --rt-id $ROUTE_TABLE_ID \
          --route-rules "[{\"cidrBlock\":\"0.0.0.0/0\",\"networkEntityId\":\"$IGW_ID\"}]" \
          --force
        
        echo "✅ Route table updated"
        
        # Create security list with ALL PORTS OPEN (1-67899)
        SECURITY_LIST_ID=$(oci network security-list create \
          --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
          --vcn-id $VCN_ID \
          --display-name "sg-vps-security-list" \
          --egress-security-rules '[{"destination":"0.0.0.0/0","protocol":"all","isStateless":false}]' \
          --ingress-security-rules '[
            {
              "source":"0.0.0.0/0",
              "protocol":"6",
              "tcpOptions":{"destinationPortRange":{"min":1,"max":67899}},
              "isStateless":false,
              "description":"Allow all TCP ports 1-67899"
            },
            {
              "source":"0.0.0.0/0",
              "protocol":"17",
              "udpOptions":{"destinationPortRange":{"min":1,"max":67899}},
              "isStateless":false,
              "description":"Allow all UDP ports 1-67899"
            },
            {
              "source":"0.0.0.0/0",
              "protocol":"1",
              "icmpOptions":{"type":8,"code":4},
              "isStateless":false,
              "description":"Allow ICMP (ping)"
            }
          ]' \
          --query 'data.id' \
          --raw-output 2>/dev/null || echo "")
        
        if [ -z "$SECURITY_LIST_ID" ]; then
          echo "Security list may already exist, trying to get existing..."
          SECURITY_LIST_ID=$(oci network security-list list \
            --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
            --vcn-id $VCN_ID \
            --display-name "sg-vps-security-list" \
            --query 'data[0].id' \
            --raw-output)
        fi
        
        echo "SECURITY_LIST_ID=$SECURITY_LIST_ID" >> $GITHUB_ENV
        echo "✅ Security list created - ALL PORTS 1-67899 OPEN!"

    - name: Create VM Instance
      id: create-vm
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        
        # Get the latest Oracle Linux image
        IMAGE_ID=$(oci compute image list \
          --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
          --operating-system "Oracle Linux" \
          --operating-system-version "8" \
          --shape "VM.Standard.E2.1.Micro" \
          --sort-by "TIMECREATED" \
          --query 'data[0].id' \
          --raw-output)
        
        echo "IMAGE_ID=$IMAGE_ID" >> $GITHUB_ENV
        echo "✅ Using image: $IMAGE_ID"
        
        # Create instance
        INSTANCE_ID=$(oci compute instance launch \
          --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
          --availability-domain "$AD_NAME" \
          --shape "VM.Standard.E2.1.Micro" \
          --subnet-id $SUBNET_ID \
          --image-id $IMAGE_ID \
          --display-name "sg-vps" \
          --metadata "{\"ssh_authorized_keys\":\"${{ env.SSH_PUBLIC_KEY_CONTENT }}\"}" \
          --wait-for-state "RUNNING" \
          --query 'data.id' \
          --raw-output)
        
        echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV
        echo "✅ Instance created: $INSTANCE_ID"
        
        # Wait for instance to be fully ready
        echo "Waiting 60 seconds for instance to initialize..."
        sleep 60
        
        # Get public IP
        for i in {1..10}; do
          PUBLIC_IP=$(oci compute instance list-vnics \
            --compartment-id ${{ secrets.ORACLE_COMPARTMENT_OCID }} \
            --instance-id $INSTANCE_ID \
            --query 'data[0]."public-ip"' \
            --raw-output)
          
          if [ -n "$PUBLIC_IP" ] && [ "$PUBLIC_IP" != "null" ]; then
            break
          fi
          echo "Waiting for public IP... attempt $i"
          sleep 10
        done
        
        echo "PUBLIC_IP=$PUBLIC_IP" >> $GITHUB_ENV
        echo "✅ VM created successfully!"
        echo "🌐 Public IP: $PUBLIC_IP"

    - name: Wait for SSH
      run: |
        echo "Waiting for SSH on ${{ env.PUBLIC_IP }}..."
        for i in {1..60}; do
          if nc -zv ${{ env.PUBLIC_IP }} 22 2>&1 | grep -q "succeeded"; then
            echo "✅ SSH ready after $i attempts"
            break
          fi
          echo "Attempt $i/60: SSH not ready..."
          sleep 10
        done

    - name: Setup VM with admin/admin
      run: |
        # Save private key
        echo "${{ env.SSH_PUBLIC_KEY_CONTENT }}" > oracle-vps-key.pub
        chmod 600 oracle-vps-key.pub
        
        # Create a setup script
        cat > setup-vm.sh << 'EOF'
        #!/bin/bash
        
        # Create admin user
        sudo useradd -m -s /bin/bash admin
        echo "admin:admin" | sudo chpasswd
        sudo usermod -aG wheel admin
        
        # Configure SSH for password auth
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo systemctl restart sshd
        
        # Allow password sudo
        echo "admin ALL=(ALL) ALL" | sudo tee /etc/sudoers.d/admin
        echo "admin ALL=(ALL) NOPASSWD: ALL" | sudo tee /etc/sudoers.d/admin-nopasswd
        
        # Install basic packages
        sudo dnf update -y
        sudo dnf install -y curl wget git vim htop net-tools docker nginx python3 python3-pip firewalld
        
        # Start Docker
        sudo systemctl enable docker
        sudo systemctl start docker
        sudo usermod -aG docker admin
        
        # Configure firewall (open all ports)
        sudo systemctl enable firewalld
        sudo systemctl start firewalld
        sudo firewall-cmd --permanent --add-port=1-67899/tcp
        sudo firewall-cmd --permanent --add-port=1-67899/udp
        sudo firewall-cmd --permanent --add-service=ssh
        sudo firewall-cmd --permanent --add-service=http
        sudo firewall-cmd --permanent --add-service=https
        sudo firewall-cmd --reload
        
        # Create welcome page
        cat > /tmp/index.html << 'HTML'
        <!DOCTYPE html>
        <html>
        <head>
            <title>Oracle Cloud Singapore VPS</title>
            <style>
                body { font-family: Arial; margin: 50px; background: linear-gradient(135deg, #ff6b6b 0%, #4ecdc4 100%); color: white; }
                .container { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 20px; text-align: center; }
                h1 { font-size: 3em; }
                .port { display: inline-block; background: rgba(255,255,255,0.2); padding: 10px; margin: 5px; border-radius: 5px; }
            </style>
        </head>
        <body>
            <div class="container">
                <h1>🇸🇬 Oracle Cloud Singapore VPS</h1>
                <p>Username: <strong>admin</strong></p>
                <p>Password: <strong>admin</strong></p>
                <p>IP Address: $(curl -s ifconfig.me)</p>
                <h2>🔥 ALL PORTS 1-67899 ARE OPEN!</h2>
                <div>
                    <span class="port">TCP 1-67899</span>
                    <span class="port">UDP 1-67899</span>
                    <span class="port">ICMP</span>
                </div>
            </div>
        </body>
        </html>
        HTML
        
        sudo cp /tmp/index.html /usr/share/nginx/html/
        sudo systemctl enable nginx
        sudo systemctl start nginx
        
        # Create test server on port 8080
        cat > /tmp/test-server.py << 'PYEOF'
        import http.server
        import socketserver
        
        PORT = 8080
        
        class Handler(http.server.SimpleHTTPRequestHandler):
            def do_GET(self):
                self.send_response(200)
                self.send_header('Content-type', 'text/html')
                self.end_headers()
                
                html = f"""
                <html>
                <head><title>Test Server</title></head>
                <body>
                    <h1>🇸🇬 Oracle Cloud Test Server</h1>
                    <p>Port 8080 is working!</p>
                    <p>Username: admin</p>
                    <p>Password: admin</p>
                </body>
                </html>
                """
                self.wfile.write(html.encode())
        
        with socketserver.TCPServer(("", PORT), Handler) as httpd:
            httpd.serve_forever()
        PYEOF
        
        cd /tmp
        python3 test-server.py &
        
        echo "✅ VM setup complete!"
        EOF
        
        chmod +x setup-vm.sh
        
        # Use sshpass if available, otherwise manual instructions
        echo "================================================"
        echo "To complete setup, SSH into your VPS and run:"
        echo "ssh opc@${{ env.PUBLIC_IP }}"
        echo "Then run the following commands:"
        echo "sudo bash -c '$(cat setup-vm.sh)'"
        echo "================================================"

    - name: Display Connection Information
      run: |
        echo "========================================================"
        echo "✅ ORACLE CLOUD SINGAPORE VPS CREATED!"
        echo "========================================================"
        echo ""
        echo "📋 CONNECTION DETAILS:"
        echo "   IP Address: ${{ env.PUBLIC_IP }}"
        echo "   Username: admin"
        echo "   Password: admin"
        echo ""
        echo "🔗 SSH COMMAND (from Oracle Linux):"
        echo "   ssh opc@${{ env.PUBLIC_IP }}"
        echo ""
        echo "📝 After SSH, run these commands to setup admin user:"
        echo "   sudo useradd -m admin"
        echo "   echo 'admin:admin' | sudo chpasswd"
        echo "   sudo usermod -aG wheel admin"
        echo "   sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config"
        echo "   sudo systemctl restart sshd"
        echo ""
        echo "🌐 WEB ACCESS:"
        echo "   http://${{ env.PUBLIC_IP }} (Nginx)"
        echo "   http://${{ env.PUBLIC_IP }}:8080 (Test Server)"
        echo ""
        echo "🔥 FIREWALL STATUS:"
        echo "   ✅ ALL PORTS 1-67899 OPEN"
        echo ""
        echo "========================================================"

    - name: Save Connection Info
      run: |
        cat > oracle-vps-info.txt << EOF
        ========================================================
        ORACLE CLOUD SINGAPORE VPS
        ========================================================
        
        IP Address: ${{ env.PUBLIC_IP }}
        
        INITIAL SSH (Oracle Linux):
        ssh opc@${{ env.PUBLIC_IP }}
        
        AFTER SETUP:
        Username: admin
        Password: admin
        SSH: ssh admin@${{ env.PUBLIC_IP }}
        
        WEB URLs:
        http://${{ env.PUBLIC_IP }}
        http://${{ env.PUBLIC_IP }}:8080
        
        FIREWALL:
        All ports 1-67899 OPEN
        
        ========================================================
        EOF

    - name: Upload Connection Info
      uses: actions/upload-artifact@v4
      with:
        name: oracle-vps-connection-info
        path: oracle-vps-info.txt
