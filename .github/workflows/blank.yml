name: Bore Tunnel Setup – 30 Days

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  setup-bore-tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 43200  # 30 days (for self-hosted runners)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust and Cargo
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source ~/.cargo/env
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          cargo --version

      - name: Install bore-cli
        run: |
          source ~/.cargo/env
          cargo install bore-cli
          echo "bore-cli installed successfully"

      - name: Install required packages
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass net-tools

      - name: Configure SSH for password authentication
        run: |
          echo "🔧 Enabling password authentication in SSH..."
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh
          sleep 3

      - name: Find SSH Port
        id: ssh_port
        run: |
          SSH_PORT=$(grep -E "^Port" /etc/ssh/sshd_config | awk '{print $2}')
          if [ -z "$SSH_PORT" ]; then
            SSH_PORT=22
          fi
          echo "✅ SSH is running on port: $SSH_PORT"
          echo "SSH_PORT=$SSH_PORT" >> $GITHUB_ENV
          echo "port=$SSH_PORT" >> $GITHUB_OUTPUT

      - name: Set Password for runner User
        run: |
          echo "runner:12345678" | sudo chpasswd
          echo "✅ Password set for runner user"

      - name: Test local SSH connection
        run: |
          echo "🧪 Testing local SSH on port ${{ env.SSH_PORT }}..."
          sleep 5
          sshpass -p "12345678" ssh -o StrictHostKeyChecking=no -p ${{ env.SSH_PORT }} runner@localhost whoami \
            && echo "✅ Local SSH OK" || echo "⚠️ Local SSH test failed"

      - name: Start Bore Tunnel (with auto‑restart)
        id: bore_tunnel
        run: |
          source ~/.cargo/env
          echo "🚀 Starting bore tunnel on port ${{ env.SSH_PORT }} (will restart if needed)..."

          # Function to start bore and capture its public port
          start_bore() {
            bore local ${{ env.SSH_PORT }} --to bore.pub > bore_output.txt 2>&1 &
            BORE_PID=$!
            sleep 10
            if grep -q "listening at bore.pub:" bore_output.txt; then
              PORT=$(grep -oP 'listening at bore.pub:\K\d+' bore_output.txt)
              if [ -n "$PORT" ]; then
                echo "$PORT" > /tmp/bore_port.txt
                echo "BORE_PORT=$PORT" >> $GITHUB_ENV
                echo "bore_port=$PORT" >> $GITHUB_OUTPUT
                return 0
              fi
            fi
            return 1
          }

          # Try up to 3 times initially
          for i in {1..3}; do
            if start_bore; then
              break
            fi
            echo "Attempt $i failed, retrying..."
            kill $BORE_PID 2>/dev/null || true
            sleep 5
          done

          if [ ! -f /tmp/bore_port.txt ]; then
            echo "❌ Failed to establish bore tunnel after 3 attempts"
            exit 1
          fi

          # Save bore PID for monitoring
          echo $BORE_PID > /tmp/bore.pid

      - name: Display Connection Information
        run: |
          echo "═══════════════════════════════════════════"
          echo "🔌 BORE TUNNEL CONNECTION DETAILS"
          echo "═══════════════════════════════════════════"
          echo "📡 Local SSH Port: ${{ env.SSH_PORT }}"
          echo "🌐 Bore Tunnel: bore.pub:${{ env.BORE_PORT }}"
          echo "👤 Username: runner"
          echo "🔑 Password: 12345678"
          echo "═══════════════════════════════════════════"
          echo ""
          echo "📱 To connect: ssh -p ${{ env.BORE_PORT }} runner@bore.pub"
          echo "═══════════════════════════════════════════"

      - name: Keep Tunnel Alive (30 days watchdog)
        run: |
          echo "🔄 Starting 30‑day watchdog – will restart bore/SSH if needed"
          echo "📊 Status updates every minute"
          echo ""

          # Load ports
          SSH_PORT=${{ env.SSH_PORT }}
          BORE_PORT=${{ env.BORE_PORT }}

          # Start a background watchdog that restarts bore if it dies
          (
            while true; do
              sleep 30
              if ! pgrep -f "bore local $SSH_PORT" > /dev/null; then
                echo "$(date) ⚠️ Bore tunnel died – restarting..."
                source ~/.cargo/env
                bore local $SSH_PORT --to bore.pub > /dev/null 2>&1 &
                NEW_BORE_PID=$!
                echo $NEW_BORE_PID > /tmp/bore.pid
                echo "$(date) ✅ Bore restarted with PID $NEW_BORE_PID"
              fi
              # Also check SSH (rarely needed, but good)
              if ! pgrep -f "sshd.*$SSH_PORT" > /dev/null; then
                echo "$(date) ⚠️ SSH died – restarting..."
                sudo /usr/sbin/sshd -p $SSH_PORT -f /etc/ssh/sshd_config -D &
                echo "$(date) ✅ SSH restarted"
              fi
            done
          ) &

          # Main loop – prints status every minute for 30 days
          COUNTER=0
          DAYS=0
          HOURS=0
          while [ $DAYS -lt 30 ]; do
            COUNTER=$((COUNTER + 1))
            if [ $COUNTER -eq 60 ]; then
              COUNTER=0
              HOURS=$((HOURS + 1))
              if [ $HOURS -eq 24 ]; then
                HOURS=0
                DAYS=$((DAYS + 1))
                echo ""
                echo "═══════════════════════════════════════════"
                echo "📊 DAY $DAYS COMPLETED – $((30 - DAYS)) days remaining"
                echo "═══════════════════════════════════════════"
              fi
            fi

            # Print status every minute
            echo "[$(date)] ⏱️ Day $DAYS, $HOURS hours – bore.pub:$BORE_PORT → localhost:$SSH_PORT  (active)"

            # Also show active connections count once per hour
            if [ $((COUNTER % 60)) -eq 0 ]; then
              CONNS=$(sudo netstat -tn | grep ":$SSH_PORT" | grep ESTABLISHED | wc -l)
              echo "   👥 Active SSH connections: $CONNS"
            fi

            sleep 60
          done

          echo "✅ 30 days completed! Tunnel closed."
