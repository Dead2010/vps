name: 30-Day VPS Connection

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  connect-to-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Install SSH Client
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass openssh-client
      
      - name: Set VPS Details
        run: |
          # IMPORTANT: REPLACE WITH YOUR ACTUAL VPS IP
          echo "VPS_IP=your-vps-ip-here" >> $GITHUB_ENV
          echo "VPS_USER=root" >> $GITHUB_ENV
          echo "VPS_PASS=root" >> $GITHUB_ENV
      
      - name: Connect to VPS
        run: |
          echo "🔄 Connecting to VPS at $VPS_IP..."
          echo "=================================="
          
          # Simple SSH connection
          sshpass -p "$VPS_PASS" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            $VPS_USER@$VPS_IP "
            echo '✅ Connected successfully!'
            echo ''
            echo '📊 System Info:'
            echo '  Hostname: ' \$(hostname)
            echo '  Uptime: ' \$(uptime -p)
            echo '  Date: ' \$(date)
            echo ''
            echo '💾 Resources:'
            free -h
            echo ''
            df -h
          " || echo "❌ Connection failed"
      
      - name: Log Success
        if: success()
        run: |
          echo "✅ Workflow completed successfully at $(date)"
          echo "Next run in 6 hours"
      
      - name: Log Failure
        if: failure()
        run: |
          echo "❌ Workflow failed at $(date)"
          echo "Check if VPS is running and IP is correct"
