name: VPS 30-Day Connection

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  connect-to-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Install SSH Client
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass openssh-server
          sudo systemctl start ssh
          echo "✅ SSH client and server installed"
      
      - name: Set VPS Credentials
        run: |
          # Using localhost (127.0.0.1) for local connection
          echo "VPS_IP=127.0.0.1" >> $GITHUB_ENV
          echo "VPS_USER=root" >> $GITHUB_ENV
          echo "VPS_PASS=root" >> $GITHUB_ENV
          
          echo "🔧 Configuration:"
          echo "   IP: $VPS_IP (localhost)"
          echo "   User: $VPS_USER"
          echo "   Port: 22"
      
      - name: Setup Local SSH
        run: |
          # Setup password for root (for local testing)
          echo "root:root" | sudo chpasswd
          
          # Allow root login with password
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh
          
          echo "✅ Local SSH configured"
      
      - name: Test Connection
        run: |
          echo "🔍 Testing connection to $VPS_IP..."
          
          # Wait for SSH to be ready
          sleep 5
          
          # Test SSH connection
          sshpass -p "$VPS_PASS" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=5 \
            $VPS_USER@$VPS_IP "echo 'SSH is working'" && \
            echo "✅ SSH connection successful" || \
            echo "❌ SSH connection failed"
      
      - name: SSH into VPS
        run: |
          echo "=================================="
          echo "🚀 Connecting to VPS at $(date)"
          echo "=================================="
          
          sshpass -p "$VPS_PASS" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            $VPS_USER@$VPS_IP "
            echo '✅ CONNECTED SUCCESSFULLY'
            echo '=================================='
            echo ''
            echo '📋 SYSTEM INFO:'
            echo '  Hostname: ' \$(hostname)
            echo '  Uptime: ' \$(uptime -p)
            echo '  Date: ' \$(date)
            echo ''
            echo '💾 RESOURCES:'
            echo '  Memory:'
            free -h
            echo '  Disk:'
            df -h /
            echo '  Processes:'
            ps aux | head -5
          " || echo "❌ Connection failed"
      
      - name: Final Status
        run: |
          echo ""
          echo "═══════════════════════════════════"
          echo "      WORKFLOW COMPLETE"
          echo "═══════════════════════════════════"
          echo ""
          echo "✅ Status: ${{ job.status }}"
          echo "🕒 Time: $(date)"
          echo "🔢 Run #: ${{ github.run_number }}"
          echo "🌐 Connected to: localhost (127.0.0.1)"
          echo ""
          echo "⏰ Next run in 6 hours"
          echo "═══════════════════════════════════"
