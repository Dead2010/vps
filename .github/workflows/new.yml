name: VPS 30-Day Connection

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs every 6 hours
  workflow_dispatch:        # Manual trigger
  push:
    branches: [ main ]      # Run on push

jobs:
  connect-to-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Install SSH Client
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass
          echo "✅ SSH client installed"
      
      - name: Set VPS Credentials
        run: |
          # !!! REPLACE THIS IP WITH YOUR ACTUAL VPS IP !!!
          echo "VPS_IP=your-vps-ip-here" >> $GITHUB_ENV
          echo "VPS_USER=root" >> $GITHUB_ENV
          echo "VPS_PASS=root" >> $GITHUB_ENV
          echo "VPS_PORT=22" >> $GITHUB_ENV
          
          echo "🔧 Configuration:"
          echo "   IP: $VPS_IP"
          echo "   User: $VPS_USER"
          echo "   Port: $VPS_PORT"
      
      - name: Test Connection
        run: |
          echo "🔍 Testing connection to $VPS_IP..."
          
          # Simple ping test
          ping -c 1 -W 3 $VPS_IP > /dev/null 2>&1
          if [ $? -eq 0 ]; then
            echo "✅ VPS is reachable"
          else
            echo "⚠️ VPS not responding to ping (might still work)"
          fi
      
      - name: SSH into VPS
        run: |
          echo "=================================="
          echo "🚀 Connecting to VPS at $(date)"
          echo "=================================="
          
          # Connect and run commands
          sshpass -p "$VPS_PASS" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            -p $VPS_PORT \
            $VPS_USER@$VPS_IP "
            echo '✅ CONNECTED SUCCESSFULLY'
            echo '=================================='
            echo ''
            echo '📋 SYSTEM INFO:'
            echo '  Hostname: ' \$(hostname)
            echo '  OS: ' \$(cat /etc/os-release | grep PRETTY_NAME | cut -d= -f2 | tr -d '\"')
            echo '  Kernel: ' \$(uname -r)
            echo '  Uptime: ' \$(uptime -p)
            echo ''
            echo '💾 RESOURCES:'
            echo '  Memory:'
            free -h
            echo '  Disk:'
            df -h /
            echo ''
            echo '🌐 NETWORK:'
            echo '  IP: ' \$(hostname -I | cut -d' ' -f1)
            echo ''
            echo '👥 USERS:'
            who || echo '  No users logged in'
            echo ''
            echo '📅 TIME: ' \$(date)
            echo '=================================='
          " || echo "❌ Connection failed"
      
      - name: Create Log File
        run: |
          mkdir -p logs
          echo "Run: ${{ github.run_number }}" > logs/status.txt
          echo "Date: $(date)" >> logs/status.txt
          echo "Status: ${{ job.status }}" >> logs/status.txt
          echo "VPS IP: $VPS_IP" >> logs/status.txt
          
          echo "📝 Log created"
      
      - name: Upload Logs
        uses: actions/upload-artifact@v4
        with:
          name: vps-logs-run-${{ github.run_number }}
          path: logs/
          retention-days: 30
      
      - name: Final Status
        run: |
          echo ""
          echo "═══════════════════════════════════"
          echo "      WORKFLOW COMPLETE"
          echo "═══════════════════════════════════"
          echo ""
          echo "✅ Status: ${{ job.status }}"
          echo "🕒 Time: $(date)"
          echo "🔢 Run #: ${{ github.run_number }}"
          echo ""
          echo "⏰ Next run in 6 hours"
          echo "📅 Will run for 30 days"
          echo "═══════════════════════════════════"
