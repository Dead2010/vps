name: VPS 30-Day Connection

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  connect-to-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Install SSH Client
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass
          echo "✅ SSH client installed"
      
      - name: Set VPS Credentials
        run: |
          # !!! IMPORTANT: PUT YOUR REAL VPS IP HERE !!!
          echo "VPS_IP=203.0.113.45" >> $GITHUB_ENV  # <-- CHANGE THIS TO YOUR IP
          echo "VPS_USER=root" >> $GITHUB_ENV
          echo "VPS_PASS=root" >> $GITHUB_ENV
          
          echo "🔧 Configuration:"
          echo "   IP: $VPS_IP"
          echo "   User: $VPS_USER"
          echo "   Port: 22"
      
      - name: Test Connection
        run: |
          echo "🔍 Testing connection to $VPS_IP..."
          
          # Try to connect
          ping -c 1 -W 3 $VPS_IP > /dev/null 2>&1
          if [ $? -eq 0 ]; then
            echo "✅ VPS is reachable"
          else
            echo "⚠️ VPS not responding to ping (SSH might still work)"
          fi
      
      - name: SSH into VPS
        run: |
          echo "=================================="
          echo "🚀 Connecting to VPS at $(date)"
          echo "=================================="
          
          sshpass -p "$VPS_PASS" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            -p 22 \
            $VPS_USER@$VPS_IP "
            echo '✅ CONNECTED SUCCESSFULLY'
            echo '=================================='
            echo ''
            echo '📋 SYSTEM INFO:'
            echo '  Hostname: ' \$(hostname)
            echo '  Uptime: ' \$(uptime -p)
            echo '  Date: ' \$(date)
            echo ''
            echo '💾 RESOURCES:'
            echo '  Memory:'
            free -h
            echo '  Disk:'
            df -h /
          " || echo "❌ Connection failed - Check if IP is correct and VPS is running"
      
      - name: Final Status
        run: |
          echo ""
          echo "═══════════════════════════════════"
          echo "      WORKFLOW COMPLETE"
          echo "═══════════════════════════════════"
          echo ""
          echo "✅ Status: ${{ job.status }}"
          echo "🕒 Time: $(date)"
          echo "🔢 Run #: ${{ github.run_number }}"
          echo ""
          echo "⏰ Next run in 6 hours"
          echo "═══════════════════════════════════"
