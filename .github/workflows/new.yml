name: Complete VPS Connection

on:
  # Schedule - runs every 6 hours for 30 days
  schedule:
    - cron: '0 */6 * * *'
  
  # Manual trigger with all options
  workflow_dispatch:
    inputs:
      vps_ip:
        description: 'VPS IP Address'
        required: false
        default: ''
        type: string
      vps_port:
        description: 'SSH Port'
        required: false
        default: '22'
        type: string
      vps_user:
        description: 'SSH Username'
        required: false
        default: 'root'
        type: string
      vps_pass:
        description: 'SSH Password'
        required: false
        default: 'root'
        type: string
      
  # Run on push to main
  push:
    branches: [ main ]

# Prevent concurrent runs
concurrency:
  group: vps-${{ github.ref }}
  cancel-in-progress: false

jobs:
  vps-connection:
    name: 🔌 VPS Connection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # Step 1: Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      # Step 2: Install required tools
      - name: Install SSH Tools
        run: |
          echo "📦 Installing required packages..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass openssh-client netcat-openbsd curl
          echo "✅ SSH tools installed successfully"
      
      # Step 3: Configure connection details
      - name: Set Connection Parameters
        id: config
        run: |
          echo "========================================="
          echo "🔧 CONFIGURING CONNECTION"
          echo "========================================="
          
          # !!! IMPORTANT: REPLACE WITH YOUR ACTUAL VPS IP !!!
          DEFAULT_IP="your-vps-ip-here"
          DEFAULT_PORT="22"
          DEFAULT_USER="root"
          DEFAULT_PASS="root"
          
          # Use manual inputs if provided, otherwise use defaults
          if [[ -n "${{ github.event.inputs.vps_ip }}" ]]; then
            VPS_IP="${{ github.event.inputs.vps_ip }}"
            VPS_PORT="${{ github.event.inputs.vps_port }}"
            VPS_USER="${{ github.event.inputs.vps_user }}"
            VPS_PASS="${{ github.event.inputs.vps_pass }}"
            echo "📝 Using manual input values"
          else
            VPS_IP="$DEFAULT_IP"
            VPS_PORT="$DEFAULT_PORT"
            VPS_USER="$DEFAULT_USER"
            VPS_PASS="$DEFAULT_PASS"
            echo "📝 Using default configured values"
          fi
          
          # Save to environment
          echo "VPS_IP=$VPS_IP" >> $GITHUB_ENV
          echo "VPS_PORT=$VPS_PORT" >> $GITHUB_ENV
          echo "VPS_USER=$VPS_USER" >> $GITHUB_ENV
          echo "VPS_PASS=$VPS_PASS" >> $GITHUB_ENV
          
          # Display configuration
          echo ""
          echo "📋 Connection Configuration:"
          echo "   • IP Address:  $VPS_IP"
          echo "   • Port:        $VPS_PORT"
          echo "   • Username:    $VPS_USER"
          echo "   • Password:    [HIDDEN]"
          echo ""
          
          # Validate IP
          if [[ "$VPS_IP" == "your-vps-ip-here" ]]; then
            echo "⚠️  WARNING: Using placeholder IP address!"
            echo "   Please replace with your actual VPS IP:"
            echo "   • Edit this file and change DEFAULT_IP"
            echo "   • Or enter IP in manual workflow run"
            echo ""
            echo "❌ Cannot proceed with placeholder IP"
            exit 1
          fi
      
      # Step 4: Create log directory
      - name: Create Log Directory
        run: |
          mkdir -p logs
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          LOG_FILE="logs/connection_${TIMESTAMP}.log"
          echo "LOG_FILE=$LOG_FILE" >> $GITHUB_ENV
          echo "📁 Log file: $LOG_FILE"
      
      # Step 5: Test network connectivity
      - name: Test Network Connectivity
        run: |
          echo "========================================="
          echo "🔍 TESTING NETWORK CONNECTIVITY"
          echo "========================================="
          
          # Test 1: Ping test
          echo "📡 Test 1: Ping Test"
          if ping -c 2 -W 3 $VPS_IP > /dev/null 2>&1; then
            echo "   ✅ VPS is reachable (ping)"
            PING_OK="true"
          else
            echo "   ⚠️  VPS not responding to ping (may still work)"
            PING_OK="false"
          fi
          
          # Test 2: Port test
          echo ""
          echo "📡 Test 2: Port $VPS_PORT Test"
          if nc -zv -w 5 $VPS_IP $VPS_PORT 2>&1 | grep -q "succeeded"; then
            echo "   ✅ Port $VPS_PORT is open"
            PORT_OK="true"
          else
            echo "   ❌ Port $VPS_PORT is closed or filtered"
            PORT_OK="false"
          fi
          
          # Save results
          echo "PING_OK=$PING_OK" >> $GITHUB_ENV
          echo "PORT_OK=$PORT_OK" >> $GITHUB_ENV
          
          # Exit if port is closed
          if [[ "$PORT_OK" == "false" ]]; then
            echo ""
            echo "❌ ERROR: Cannot connect to VPS on port $VPS_PORT"
            echo "   Please check:"
            echo "   • VPS is running"
            echo "   • SSH service is enabled"
            echo "   • Firewall allows port $VPS_PORT"
            echo "   • IP address is correct"
            exit 1
          fi
      
      # Step 6: Connect to VPS and get system information
      - name: Connect to VPS
        id: connect
        run: |
          echo "========================================="
          echo "🚀 CONNECTING TO VPS"
          echo "========================================="
          echo "Time: $(date)"
          echo "Target: $VPS_USER@$VPS_IP:$VPS_PORT"
          echo ""
          
          # Write header to log file
          {
            echo "========================================="
            echo "VPS CONNECTION LOG - $(date)"
            echo "========================================="
            echo "IP: $VPS_IP"
            echo "Port: $VPS_PORT"
            echo "User: $VPS_USER"
            echo "========================================="
            echo ""
          } > $LOG_FILE
          
          # SSH Commands to run on VPS
          SSH_COMMANDS=$(cat << 'EOF'
            echo "════════════════════════════════════════"
            echo "         VPS SYSTEM INFORMATION"
            echo "════════════════════════════════════════"
            echo ""
            
            # Basic system info
            echo "📋 BASIC SYSTEM INFO"
            echo "────────────────────"
            echo "Hostname: $(hostname)"
            echo "OS: $(cat /etc/os-release | grep PRETTY_NAME | cut -d= -f2 | tr -d '"')"
            echo "Kernel: $(uname -r)"
            echo "Architecture: $(uname -m)"
            echo "Uptime: $(uptime -p)"
            echo "Load Average: $(uptime | awk -F'load average:' '{print $2}')"
            echo ""
            
            # Date and time
            echo "📅 DATE & TIME"
            echo "──────────────"
            echo "Date: $(date)"
            echo "Timezone: $(date +%Z)"
            echo ""
            
            # CPU info
            echo "💻 CPU INFORMATION"
            echo "──────────────────"
            echo "CPU Cores: $(nproc)"
            echo "CPU Model: $(lscpu | grep 'Model name' | cut -d: -f2 | xargs)"
            echo ""
            
            # Memory info
            echo "💾 MEMORY USAGE"
            echo "───────────────"
            free -h
            echo ""
            
            # Disk info
            echo "💽 DISK USAGE"
            echo "──────────────"
            df -h
            echo ""
            
            # Network info
            echo "🌐 NETWORK INFORMATION"
            echo "──────────────────────"
            echo "IP Addresses: $(hostname -I)"
            echo ""
            echo "Open Ports (LISTEN):"
            ss -tuln | grep LISTEN | head -15
            echo ""
            
            # User info
            echo "👥 USER INFORMATION"
            echo "───────────────────"
            echo "Logged in users:"
            who || echo "  No users logged in"
            echo ""
            echo "Last 5 logins:"
            last -5 2>/dev/null || echo "  Command not available"
            echo ""
            
            # Process info
            echo "⚙️  PROCESS INFORMATION"
            echo "───────────────────────"
            echo "Top 5 CPU processes:"
            ps aux --sort=-%cpu | head -6
            echo ""
            echo "Top 5 Memory processes:"
            ps aux --sort=-%mem | head -6
            echo ""
            
            # Service info
            echo "🔧 RUNNING SERVICES"
            echo "───────────────────"
            systemctl list-units --type=service --state=running --no-pager | head -15
            echo ""
            
            # Security info
            echo "🔒 SECURITY INFORMATION"
            echo "───────────────────────"
            echo "Failed SSH logins (last 10):"
            grep "Failed password" /var/log/auth.log 2>/dev/null | tail -10 || echo "  No failed logins or log not accessible"
            echo ""
            
            echo "════════════════════════════════════════"
            echo "Connection completed at: $(date)"
            echo "════════════════════════════════════════"
EOF
)
          
          # Execute SSH connection
          sshpass -p "$VPS_PASS" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            -o ConnectionAttempts=3 \
            -o ServerAliveInterval=30 \
            -p $VPS_PORT \
            $VPS_USER@$VPS_IP "$SSH_COMMANDS" >> $LOG_FILE 2>&1
          
          SSH_EXIT_CODE=$?
          
          # Check if connection was successful
          if [ $SSH_EXIT_CODE -eq 0 ]; then
            echo "✅ SSH connection successful!" | tee -a $LOG_FILE
            echo "STATUS=success" >> $GITHUB_ENV
            echo "CONNECTED=true" >> $GITHUB_ENV
          else
            echo "❌ SSH connection failed with code $SSH_EXIT_CODE" | tee -a $LOG_FILE
            echo "STATUS=failed" >> $GITHUB_ENV
            echo "CONNECTED=false" >> $GITHUB_ENV
          fi
          
          # Display log summary
          echo ""
          echo "📄 Connection Log Summary:"
          echo "──────────────────────────"
          tail -20 $LOG_FILE
      
      # Step 7: Create JSON output
      - name: Create JSON Output
        if: env.CONNECTED == 'true'
        run: |
          JSON_FILE="logs/connection_$(date +%Y%m%d_%H%M%S).json"
          
          cat > $JSON_FILE << EOF
          {
            "timestamp": "$(date -Iseconds)",
            "run_number": ${{ github.run_number }},
            "vps": {
              "ip": "$VPS_IP",
              "port": "$VPS_PORT",
              "user": "$VPS_USER"
            },
            "status": "success",
            "connection_time": "$(date)"
          }
          EOF
          
          echo "📊 JSON output created: $JSON_FILE"
      
      # Step 8: Create summary report
      - name: Create Summary Report
        if: always()
        run: |
          REPORT_FILE="logs/summary_$(date +%Y%m%d_%H%M%S).txt"
          
          cat > $REPORT_FILE << EOF
╔══════════════════════════════════════════════════════════════╗
║                 VPS CONNECTION SUMMARY REPORT                ║
╚══════════════════════════════════════════════════════════════╝

📅 DATE: $(date)
🆔 RUN NUMBER: ${{ github.run_number }}
🆔 RUN ID: ${{ github.run_id }}

🔌 CONNECTION DETAILS:
   • IP Address:     $VPS_IP
   • Port:           $VPS_PORT
   • Username:       $VPS_USER
   • Password:       [HIDDEN]

📊 CONNECTION TESTS:
   • Ping Test:      ${PING_OK:-unknown}
   • Port Test:      ${PORT_OK:-unknown}
   • SSH Status:     ${STATUS:-unknown}

⏰ SCHEDULE INFORMATION:
   • Frequency:      Every 6 hours
   • Daily runs:     4 connections
   • 30-day total:   ~120 connections
   • Next run:       $(date -d '+6 hours' 2>/dev/null || echo "in 6 hours")

📁 LOG FILES:
   • Connection log: $LOG_FILE
   • This report:    $REPORT_FILE

⚙️ WORKFLOW INFORMATION:
   • Triggered by:   ${{ github.event_name }}
   • Actor:          ${{ github.actor }}
   • Branch:         ${{ github.ref_name }}

📝 NOTES:
   • Logs are retained for 30 days
   • To stop after 30 days: Disable workflow in Actions tab
   • To run manually: Use workflow_dispatch with custom values

════════════════════════════════════════════════════════════════
EOF
          
          echo "📄 Summary report created: $REPORT_FILE"
          cat $REPORT_FILE
      
      # Step 9: Upload all logs as artifacts
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vps-logs-run-${{ github.run_number }}
          path: logs/
          retention-days: 30
          compression-level: 6
          if-no-files-found: warn
      
      # Step 10: Final status display
      - name: Display Final Status
        if: always()
        run: |
          echo ""
          echo "████████████████████████████████████████████████████████"
          echo "██                                                    ██"
          echo "██              WORKFLOW EXECUTION COMPLETE           ██"
          echo "██                                                    ██"
          echo "████████████████████████████████████████████████████████"
          echo ""
          echo "   🔌 VPS:         $VPS_IP:$VPS_PORT"
          echo "   👤 User:        $VPS_USER"
          
          if [ "$STATUS" == "success" ]; then
            echo "   ✅ Status:       SUCCESS"
          elif [ "$STATUS" == "failed" ]; then
            echo "   ❌ Status:       FAILED"
          else
            echo "   ⚠️ Status:       UNKNOWN"
          fi
          
          echo ""
          echo "   🕒 Time:         $(date)"
          echo "   🔢 Run #:        ${{ github.run_number }}"
          echo ""
          echo "   📁 Logs saved:   vps-logs-run-${{ github.run_number }}"
          echo "   💾 Retention:    30 days"
          echo ""
          echo "   ⏰ Next run:      $(date -d '+6 hours' 2>/dev/null || echo 'in 6 hours')"
          echo "   📅 30-day total: ~120 runs"
          echo ""
          echo "   💡 To stop early: Disable workflow in Actions tab"
          echo ""
          echo "████████████████████████████████████████████████████████"

  # Job 2: Health check monitor
  health-check:
    name: 💓 Health Check
    needs: vps-connection
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Monitor Health
        run: |
          echo "========================================="
          echo "💓 HEALTH CHECK MONITOR"
          echo "========================================="
          echo ""
          echo "📊 Workflow Status: ${{ needs.vps-connection.result }}"
          echo ""
          
          if [ "${{ needs.vps-connection.result }}" == "success" ]; then
            echo "✅ All systems operational"
            echo "✅ VPS connection successful"
            echo "✅ Logs saved successfully"
          else
            echo "⚠️ Some issues detected:"
            echo "   • Connection may have failed"
            echo "   • Check logs for details"
          fi
          
          echo ""
          echo "📈 30-Day Progress:"
          echo "   • Current run: ${{ github.run_number }}"
          echo "   • Progress: $(( (${{ github.run_number }} * 100) / 120 ))%"
          echo ""
          echo "✅ Health check complete"
