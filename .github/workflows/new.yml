name: Show My IP Address

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */12 * * *'  # Runs every 12 hours

jobs:
  show-ip:
    runs-on: ubuntu-latest
    
    steps:
      - name: Show GitHub Runner IP
        run: |
          echo "========================================="
          echo "🌐 GITHUB RUNNER IP ADDRESS"
          echo "========================================="
          
          # Get IP from multiple sources
          echo "📡 IP from ifconfig.me:"
          curl -s ifconfig.me || echo "Failed to get IP"
          
          echo ""
          echo "📡 IP from icanhazip.com:"
          curl -s icanhazip.com || echo "Failed to get IP"
          
          echo ""
          echo "📡 IP from ipinfo.io:"
          curl -s ipinfo.io/ip || echo "Failed to get IP"
          
          echo ""
          echo "📡 All network interfaces:"
          ip addr show | grep inet
      
      - name: Try to Detect VPS IP (if configured)
        run: |
          echo "========================================="
          echo "🔍 ATTEMPTING TO DETECT VPS IP"
          echo "========================================="
          
          # This is where you would put your VPS IP if you have one
          # For now, it will show as not configured
          
          echo "⚠️ No VPS IP configured in this workflow"
          echo ""
          echo "To add your VPS IP, edit this file and replace:"
          echo "YOUR_VPS_IP_HERE with your actual IP"
      
      - name: Show Localhost Info
        run: |
          echo "========================================="
          echo "💻 LOCALHOST INFORMATION"
          echo "========================================="
          
          echo "Hostname: $(hostname)"
          echo "Local IP: 127.0.0.1"
          echo ""
          echo "Network interfaces:"
          ip -4 addr show | grep -oP '(?<=inet\s)\d+(\.\d+){3}'
      
      - name: Create IP Report
        run: |
          cat > ip-report.txt << EOF
          =========================================
          IP ADDRESS REPORT
          Generated: $(date)
          =========================================
          
          GITHUB RUNNER INFORMATION:
          --------------------------
          Hostname: $(hostname)
          Runner IPs:
          $(ip addr show | grep inet | awk '{print "  - " $2}')
          
          PUBLIC IPs:
          -----------
          ifconfig.me: $(curl -s --max-time 5 ifconfig.me 2>/dev/null || echo "Timeout")
          icanhazip.com: $(curl -s --max-time 5 icanhazip.com 2>/dev/null || echo "Timeout")
          
          VPS CONFIGURATION:
          -----------------
          To add your VPS, set VPS_IP in the workflow
          
          =========================================
          EOF
          
          echo "📄 IP Report created"
          cat ip-report.txt
      
      - name: Upload IP Report
        uses: actions/upload-artifact@v4
        with:
          name: ip-report-${{ github.run_number }}
          path: ip-report.txt
          retention-days: 30
      
      - name: Summary
        run: |
          echo ""
          echo "════════════════════════════════════════"
          echo "         IP ADDRESS SUMMARY"
          echo "════════════════════════════════════════"
          echo ""
          echo "📍 GitHub Runner IP:"
          echo "   - Check the logs above"
          echo "   - Or download the IP report artifact"
          echo ""
          echo "💡 To add your VPS IP:"
          echo "   1. Edit this workflow file"
          echo "   2. Find YOUR_VPS_IP_HERE"
          echo "   3. Replace with your actual IP"
          echo ""
          echo "📁 IP report saved as: ip-report-${{ github.run_number }}"
          echo "════════════════════════════════════════"
